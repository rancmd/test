<div class="page-title">SYSTEM OVERVIEW</div>
<div class="home-grid">
  <div class="home-card" onclick="showPage('stat')">
    <svg width="28" height="16" viewBox="0 0 22 12" fill="none"><rect x="0" y="2" width="18" height="8" stroke="white" stroke-width="1.5"/><rect x="18" y="4" width="4" height="4" fill="white"/><rect id="hc-bat" x="1.5" y="3.5" width="12" height="5" fill="white"/></svg>
    <div class="hc-val" id="home-bat">87%</div>
    <div class="hc-label">BATTERY</div>
  </div>
  <div class="home-card" onclick="showPage('stat')">
    <svg width="26" height="26" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.5"/><line x1="10" y1="5" x2="10" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="square"/><line x1="10" y1="10" x2="14" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="square"/></svg>
    <div class="hc-val" id="home-clock-sm">--:--</div>
    <div class="hc-label">TIME</div>
  </div>
  <div class="home-card" onclick="showPage('scan')">
    <svg width="26" height="26" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.5"/><circle cx="10" cy="10" r="4" stroke="white" stroke-width="1"/><circle cx="10" cy="10" r="1.5" fill="white"/></svg>

    <div class="hc-label">SCANNER</div>
  </div>
  <div class="home-card" onclick="showPage('vault')">
    <svg width="20" height="26" viewBox="0 0 16 20" fill="none"><rect x="1" y="8" width="14" height="11" stroke="white" stroke-width="1.5"/><path d="M4 8V5a4 4 0 0 1 8 0v3" stroke="white" stroke-width="1.5" fill="none"/><circle cx="8" cy="13" r="2" fill="white"/></svg>
    <div class="hc-val">7</div>
    <div class="hc-label">VAULT</div>
  </div>
  <div class="home-card" onclick="showPage('radio')">
    <svg width="28" height="22" viewBox="0 0 22 18" fill="none"><rect x="2" y="6" width="18" height="11" stroke="white" stroke-width="1.5"/><circle cx="11" cy="11" r="3" fill="white"/><line x1="5" y1="6" x2="11" y2="1" stroke="white" stroke-width="1.5"/><line x1="17" y1="6" x2="11" y2="1" stroke="white" stroke-width="1.5"/></svg>

    <div class="hc-label">RADIO</div>
  </div>
  <div class="home-card" onclick="showPage('tasks')">
    <svg width="22" height="24" viewBox="0 0 18 20" fill="none"><rect x="1" y="1" width="16" height="18" stroke="white" stroke-width="1.5"/><line x1="5" y1="7" x2="13" y2="7" stroke="white" stroke-width="1.5"/><line x1="5" y1="11" x2="13" y2="11" stroke="white" stroke-width="1.5"/><line x1="5" y1="15" x2="10" y2="15" stroke="white" stroke-width="1.5"/></svg>
    <div class="hc-val" id="home-tasks">0/3</div>
    <div class="hc-label">TASKS</div>
  </div>
  <div class="home-card" onclick="showPage('map')">
    <svg width="26" height="26" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="white" stroke-width="1.5"/><polygon points="10,3 12,10 10,8 8,10" fill="white"/><circle cx="10" cy="10" r="1.5" fill="white"/></svg>
    <div class="hc-val">32°N</div>
    <div class="hc-label">MAP</div>

  <div class="home-card" onclick="showPage('calc')">
    <svg width="20" height="24" viewBox="0 0 16 20" fill="none"><rect x="1" y="1" width="14" height="18" stroke="white" stroke-width="1.5"/><rect x="3" y="3" width="10" height="4" fill="white"/><rect x="3" y="10" width="3" height="2" fill="white"/><rect x="6.5" y="10" width="3" height="2" fill="white"/><rect x="10" y="10" width="3" height="2" fill="white"/><rect x="3" y="14" width="3" height="2" fill="white"/><rect x="6.5" y="14" width="3" height="2" fill="white"/><rect x="10" y="12" width="3" height="4" fill="white"/></svg>

    <div class="hc-label">CALCULATOR</div>
