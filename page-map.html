<div class="page-title">NAVIGATION</div>
<div class="map-layout">
  <div class="map-left">
    <div class="compass">
      <span class="cdir n">N</span><span class="cdir s">S</span>
      <span class="cdir e">E</span><span class="cdir w">W</span>
      <div class="needle" id="needle"><div class="needle-n"></div><div class="needle-s"></div></div>
      <div class="compass-dot"></div>
    </div>
    <div class="map-coords">
      <div class="coord-box"><div class="coord-val">32.07°N</div><div class="coord-label">LATITUDE</div></div>
      <div class="coord-box"><div class="coord-val">34.78°E</div><div class="coord-label">LONGITUDE</div></div>
    </div>
  </div>
  <div class="map-right">
    <div class="map-radar-big">
      <div class="radar-dot"></div>
      <div class="radar-ring"></div>
      <div class="radar-sweep"></div>
    </div>
    <div class="map-info">
      <div class="map-info-row"><span class="mi-label">ZONE</span><span class="mi-val">TEL AVIV SEC-4</span></div>
      <div class="map-info-row"><span class="mi-label">ELEV</span><span class="mi-val">5M ASL</span></div>
      <div class="map-info-row"><span class="mi-label">THREAT</span><span class="mi-val">LOW</span></div>
      <div class="map-info-row"><span class="mi-label">SHELTER</span><span class="mi-val">0.4 KM</span></div>
    </div>
  </div>
</div>
