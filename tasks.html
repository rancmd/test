<div class="page-title">TASK LOG</div>
<div class="tasks-wrap">
  <div class="task-bar">
    <input class="task-input" id="task-input" type="text" placeholder="NEW TASK..." maxlength="40" onkeydown="if(event.key==='Enter')addTask()">
    <button class="task-add" onclick="addTask()">ADD</button>
  </div>
  <div class="task-list" id="task-list"></div>
</div>
